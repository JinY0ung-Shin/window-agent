<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Community Hub{% endblock %} — Window Agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { --pico-font-size: 16px; }
    .badge { display: inline-block; padding: 0.15em 0.5em; border-radius: 4px; font-size: 0.8em; background: var(--pico-secondary-background); }
    .badge-skill { background: #dbeafe; color: #1e40af; }
    .badge-note { background: #dcfce7; color: #166534; }
    .badge-type { background: #f3e8ff; color: #6b21a8; }
    .stats { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .stat-card { flex: 1; text-align: center; padding: 1rem; border-radius: 8px; background: var(--pico-card-background-color); }
    .stat-card h2 { margin: 0; font-size: 2rem; }
    .stat-card small { color: var(--pico-muted-color); }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card-grid article { margin: 0; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    pre { background: var(--pico-code-background-color); padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1.5rem; }
    nav .brand { font-weight: bold; font-size: 1.2rem; text-decoration: none; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--pico-muted-color); }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <nav class="container">
    <ul>
      <li><a href="/" class="brand">Window Agent Hub</a></li>
    </ul>
    <ul>
      <li><a href="/agents">Agents</a></li>
      <li><a href="/skills">Skills</a></li>
      <li><a href="/notes">Notes</a></li>
    </ul>
    <ul>
      <li><a href="/login">Login</a></li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="container">
    <small>Window Agent Community Hub</small>
  </footer>
</body>
</html>
