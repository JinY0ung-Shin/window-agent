name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install sidecar dependencies
        run: npm ci
        working-directory: browser-sidecar

      - name: Download Node.js binary for bundling
        shell: pwsh
        run: |
          $nodeVersion = "v22.21.1"
          $url = "https://nodejs.org/dist/$nodeVersion/win-x64/node.exe"
          Invoke-WebRequest -Uri $url -OutFile "browser-sidecar/node.exe"
          Write-Host "Downloaded node.exe: $((Get-Item browser-sidecar/node.exe).Length / 1MB) MB"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
